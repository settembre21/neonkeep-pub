<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN // NEON KEEP</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=1.1">
    <link rel="icon" type="image/jpeg" href="/static/favicon.jpg?v=1.1">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="neon-title">// NEON_KEEP //</h1>
            <p class="auth-subtitle">AUTHENTICATION REQUIRED</p>

            <form id="login-form" class="auth-form">
                <div class="input-group">
                    <label for="username">USER_ID</label>
                    <input type="text" id="username" autocomplete="username" required placeholder="INPUT USERNAME...">
                </div>
                <div class="input-group">
                    <label for="password">PASS_CODE</label>
                    <input type="password" id="password" autocomplete="current-password" required placeholder="INPUT PASSWORD...">
                </div>
                
                <div id="error-message" class="auth-error-msg hidden">
                    SYS_ERR: INVALID_CREDENTIALS //
                </div>

                <button type="submit" class="cyber-btn auth-btn">
                    <span>CONNECT_TO_NODE</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const errorMsg = document.getElementById('error-message');

            errorMsg.classList.add('hidden');

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: usernameInput.value,
                        password: passwordInput.value
                    })
                });

                if (response.ok) {
                    window.location.href = '/';
                } else {
                    const data = await response.json();
                    errorMsg.textContent = `SYS_ERR: ${data.detail || 'CONNECTION_FAILED'} //`;
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = 'SYS_ERR: OFFLINE_OR_TIMEOUT //';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
